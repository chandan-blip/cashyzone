<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c8340"/>
      <stop offset="1" stop-color="#16c45f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6f9e2"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="260" fill="#ffffff" opacity="0.07"/>
  <circle cx="160" cy="560" r="220" fill="#ffffff" opacity="0.06"/>

  <g transform="translate(90,90)">
    <rect width="76" height="76" rx="20" fill="#ffffff"/>
    <text x="38" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#16c45f" text-anchor="middle" dominant-baseline="central">₹</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" dominant-baseline="central">CashyZone</text>
  </g>

  <text x="90" y="270" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Earn INR on every</text>
  <text x="90" y="355" font-family="Arial, sans-serif" font-size="74" font-weight="800" fill="url(#accent)">data entry task</text>

  <text x="90" y="425" font-family="Arial, sans-serif" font-size="32" font-weight="400" fill="#eafff2">Type simple paragraphs · Get paid instantly to UPI</text>

  <g font-family="Arial, sans-serif" font-size="30" font-weight="700">
    <rect x="90" y="475" width="260" height="68" rx="34" fill="#ffffff"/>
    <text x="220" y="510" fill="#0c8340" text-anchor="middle" dominant-baseline="central">₹100–₹600 / task</text>

    <rect x="370" y="475" width="200" height="68" rx="34" fill="#ffffff" opacity="0.18"/>
    <text x="470" y="510" fill="#ffffff" text-anchor="middle" dominant-baseline="central">150 tasks</text>

    <rect x="590" y="475" width="230" height="68" rx="34" fill="#ffffff" opacity="0.18"/>
    <text x="705" y="510" fill="#ffffff" text-anchor="middle" dominant-baseline="central">Instant UPI</text>
  </g>
</svg>
