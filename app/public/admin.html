<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — CashyZone</title>
  <script src="/assets/head.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="nav"></div>

  <main class="max-w-6xl mx-auto px-5 py-5">
    <h1 class="text-3xl font-black">Admin dashboard</h1>
    <p class="text-slate-500 mt-1">Manage users, deposits and withdrawals. All amounts in INR.</p>

    <!-- Stats -->
    <div id="stats" class="mt-8 grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="bg-white rounded-2xl border border-slate-200 p-5"><p class="text-3xl font-black" id="sUsers">–</p><p class="text-sm text-slate-500">Users</p></div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5"><p class="text-3xl font-black text-amber-600" id="sDep">–</p><p class="text-sm text-slate-500">Pending deposits</p></div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5"><p class="text-3xl font-black text-amber-600" id="sWd">–</p><p class="text-sm text-slate-500">Pending withdrawals</p></div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5"><p class="text-3xl font-black text-amber-600" id="sKyc">–</p><p class="text-sm text-slate-500">Pending KYC</p></div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5"><p class="text-3xl font-black text-brand-600" id="sPaid">–</p><p class="text-sm text-slate-500">Total paid out</p></div>
    </div>

    <!-- Tabs -->
    <div class="mt-8 flex gap-2 text-sm">
      <button data-tab="deposits" class="tab px-4 py-2 rounded-xl bg-brand-500 text-white font-semibold">Deposits</button>
      <button data-tab="withdrawals" class="tab px-4 py-2 rounded-xl bg-white border border-slate-200 font-semibold">Withdrawals</button>
      <button data-tab="kyc" class="tab px-4 py-2 rounded-xl bg-white border border-slate-200 font-semibold">KYC</button>
      <button data-tab="users" class="tab px-4 py-2 rounded-xl bg-white border border-slate-200 font-semibold">Users</button>
      <button data-tab="settings" class="tab px-4 py-2 rounded-xl bg-white border border-slate-200 font-semibold">Settings</button>
    </div>

    <!-- Table view (deposits / withdrawals / kyc / users) -->
    <div id="tableView" class="mt-5 bg-white rounded-3xl border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead id="thead" class="bg-slate-50 text-left text-slate-500"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Settings view -->
    <div id="settingsView" hidden class="mt-5">
      <form id="settingsForm" class="bg-white rounded-3xl border border-slate-200 p-6 max-w-2xl">
        <h2 class="text-xl font-black">Site settings</h2>
        <p class="text-slate-500 text-sm mt-1">These values are live — changes apply immediately across the app.</p>
        <div id="settingsFields" class="mt-6 space-y-5"></div>
        <p id="settingsMsg" hidden class="mt-4 text-sm"></p>
        <button class="mt-6 bg-brand-500 hover:bg-brand-600 text-white font-semibold px-6 py-3 rounded-xl transition">Save settings</button>
      </form>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    if (!CZ.requireAdmin()) { /* redirected */ }
    CZ.renderNav('admin');

    let tab = 'deposits';

    const badge = (s) => {
      const map = {
        pending: 'bg-amber-100 text-amber-700', approved: 'bg-brand-100 text-brand-700',
        rejected: 'bg-red-100 text-red-700', verified: 'bg-brand-100 text-brand-700',
        awaiting_payment: 'bg-slate-100 text-slate-600',
      };
      return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${map[s] || ''}">${(s || '').replace('_', ' ')}</span>`;
    };
    const when = (d) => new Date(d).toLocaleString('en-IN');
    const th = (cols) => '<tr>' + cols.map((c) => `<th class="px-4 py-3 font-semibold">${c}</th>`).join('') + '</tr>';
    const td = (v) => `<td class="px-4 py-3">${v}</td>`;

    async function act(kind, id, action) {
      try {
        await CZ.api(`/api/admin/${kind}/${id}/${action}`, { method: 'POST' });
        const done = (action === 'reject') ? 'Rejected' : (action === 'verify') ? 'Verified' : 'Approved';
        CZ.toast(`${done} ✓`);
        load();
      } catch (err) { CZ.toast(err.message); }
    }
    window.act = act;

    // Toggle per-user automation (auto-approve deposits/withdrawals + auto KYC for that user).
    async function toggleAuto(id, enabled) {
      try {
        await CZ.api(`/api/admin/users/${id}/auto`, { method: 'POST', body: JSON.stringify({ enabled }) });
        CZ.toast(enabled ? 'Auto mode ON for user' : 'Auto mode OFF for user');
        load();
      } catch (err) { CZ.toast(err.message); }
    }
    window.toggleAuto = toggleAuto;

    async function loadStats() {
      const s = await CZ.api('/api/admin/stats');
      document.getElementById('sUsers').textContent = s.users;
      document.getElementById('sDep').textContent = s.pendingDeposits;
      document.getElementById('sWd').textContent = s.pendingWithdrawals;
      document.getElementById('sKyc').textContent = s.pendingKyc;
      document.getElementById('sPaid').textContent = CZ.money(s.totalPaidOut);
    }

    async function renderSettings() {
      const { settings } = await CZ.api('/api/admin/settings');
      const groups = {};
      settings.forEach((s) => { (groups[s.group] = groups[s.group] || []).push(s); });
      document.getElementById('settingsFields').innerHTML = Object.entries(groups).map(([group, items]) => `
        <div>
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">${group}</p>
          <div class="mt-2 space-y-3">
            ${items.map((s) => s.type === 'boolean'
              ? `<label class="flex items-center justify-between gap-3 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3">
                   <span class="text-sm font-medium text-slate-600">${s.label}</span>
                   <input name="${s.key}" type="checkbox" ${s.value ? 'checked' : ''}
                     class="h-5 w-5 accent-brand-500 cursor-pointer" />
                 </label>`
              : `<label class="block">
                   <span class="text-sm font-medium text-slate-600">${s.label}</span>
                   <input name="${s.key}" value="${s.value}" ${s.type === 'number' ? 'type="number" step="any"' : 'type="text"'}
                     class="mt-1 w-full px-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200 focus:border-brand-400 outline-none" />
                 </label>`).join('')}
          </div>
        </div>`).join('');
    }

    async function load() {
      loadStats();

      // Settings is a form view, not a table.
      const isSettings = tab === 'settings';
      document.getElementById('tableView').hidden = isSettings;
      document.getElementById('settingsView').hidden = !isSettings;
      if (isSettings) { renderSettings(); return; }

      const thead = document.getElementById('thead');
      const tbody = document.getElementById('tbody');

      if (tab === 'deposits') {
        const rows = await CZ.api('/api/admin/deposits');
        thead.innerHTML = th(['User', 'Amount', 'UTR', 'Status', 'Date', 'Action']);
        tbody.innerHTML = rows.length ? rows.map((r) => `<tr class="border-t border-slate-100">
          ${td(`<b>${r.name}</b><br><span class="text-xs text-slate-400">${r.email}</span>`)}
          ${td('<b>' + CZ.money(r.amount) + '</b>')}
          ${td('<span class="font-mono text-xs">' + r.utr + '</span>')}
          ${td(badge(r.status))}
          ${td('<span class="text-xs text-slate-400">' + when(r.created_at) + '</span>')}
          ${td(r.status === 'pending'
            ? `<div class="flex gap-2"><button onclick="act('deposits',${r.id},'approve')" class="px-3 py-1.5 rounded-lg bg-brand-500 text-white font-semibold">Approve</button>
               <button onclick="act('deposits',${r.id},'reject')" class="px-3 py-1.5 rounded-lg bg-red-100 text-red-700 font-semibold">Reject</button></div>`
            : '<span class="text-slate-400">—</span>')}
        </tr>`).join('') : `<tr><td colspan="6" class="px-4 py-8 text-center text-slate-400">No deposits.</td></tr>`;

      } else if (tab === 'withdrawals') {
        const rows = await CZ.api('/api/admin/withdrawals');
        thead.innerHTML = th(['User', 'Amount', 'UPI ID', 'Status', 'Date', 'Action']);
        tbody.innerHTML = rows.length ? rows.map((r) => `<tr class="border-t border-slate-100">
          ${td(`<b>${r.name}</b><br><span class="text-xs text-slate-400">${r.email}</span>`)}
          ${td('<b>' + CZ.money(r.amount) + '</b>')}
          ${td('<span class="font-mono text-xs">' + r.upi_id + '</span>')}
          ${td(badge(r.status))}
          ${td('<span class="text-xs text-slate-400">' + when(r.created_at) + '</span>')}
          ${td(r.status === 'pending'
            ? `<div class="flex gap-2"><button onclick="act('withdrawals',${r.id},'approve')" class="px-3 py-1.5 rounded-lg bg-brand-500 text-white font-semibold">Approve</button>
               <button onclick="act('withdrawals',${r.id},'reject')" class="px-3 py-1.5 rounded-lg bg-red-100 text-red-700 font-semibold">Reject</button></div>`
            : '<span class="text-slate-400">—</span>')}
        </tr>`).join('') : `<tr><td colspan="6" class="px-4 py-8 text-center text-slate-400">No withdrawals.</td></tr>`;

      } else if (tab === 'kyc') {
        const rows = await CZ.api('/api/admin/kyc');
        thead.innerHTML = th(['User', 'Details', 'Fee', 'Status', 'Date', 'Action']);
        tbody.innerHTML = rows.length ? rows.map((r) => `<tr class="border-t border-slate-100 align-top">
          ${td(`<b>${r.name}</b><br><span class="text-xs text-slate-400">${r.email}</span>`)}
          ${td(`<div class="text-xs leading-relaxed">
                  <div><b>${r.full_name}</b></div>
                  ${r.pan ? 'PAN: ' + r.pan + '<br>' : ''}
                  ${r.aadhaar ? 'Aadhaar: ' + r.aadhaar + '<br>' : ''}
                  ${r.bank_account ? 'A/C: ' + r.bank_account + (r.ifsc ? ' (' + r.ifsc + ')' : '') + '<br>' : ''}
                  ${r.address ? '<span class="text-slate-400">' + r.address + '</span>' : ''}
                </div>`)}
          ${td(r.fee_amount ? '<b>' + CZ.money(r.fee_amount) + '</b><br><span class="font-mono text-xs text-slate-400">UTR ' + (r.fee_utr || '-') + '</span>' : '<span class="text-slate-400">not paid</span>')}
          ${td(badge(r.status))}
          ${td('<span class="text-xs text-slate-400">' + when(r.created_at) + '</span>')}
          ${td(r.status === 'pending'
            ? `<div class="flex gap-2"><button onclick="act('kyc',${r.id},'verify')" class="px-3 py-1.5 rounded-lg bg-brand-500 text-white font-semibold">Verify</button>
               <button onclick="act('kyc',${r.id},'reject')" class="px-3 py-1.5 rounded-lg bg-red-100 text-red-700 font-semibold">Reject</button></div>`
            : '<span class="text-slate-400">—</span>')}
        </tr>`).join('') : `<tr><td colspan="6" class="px-4 py-8 text-center text-slate-400">No KYC requests.</td></tr>`;

      } else {
        const rows = await CZ.api('/api/admin/users');
        thead.innerHTML = th(['ID', 'Name', 'Email', 'Balance', 'Role', 'Auto mode', 'Joined']);
        tbody.innerHTML = rows.map((r) => `<tr class="border-t border-slate-100">
          ${td('#' + r.id)}
          ${td('<b>' + r.name + '</b>')}
          ${td(r.email)}
          ${td('<b>' + CZ.money(r.balance) + '</b>')}
          ${td(r.is_admin ? '<span class="text-xs font-semibold text-brand-700">Admin</span>' : '<span class="text-xs text-slate-500">User</span>')}
          ${td(`<button onclick="toggleAuto(${r.id}, ${r.auto_mode ? 'false' : 'true'})"
                  class="px-3 py-1.5 rounded-lg text-xs font-semibold ${r.auto_mode ? 'bg-brand-500 text-white' : 'bg-slate-100 text-slate-600'}">
                  ${r.auto_mode ? 'ON' : 'OFF'}</button>`)}
          ${td('<span class="text-xs text-slate-400">' + when(r.created_at) + '</span>')}
        </tr>`).join('');
      }
    }

    document.querySelectorAll('.tab').forEach((b) => b.addEventListener('click', () => {
      tab = b.dataset.tab;
      document.querySelectorAll('.tab').forEach((x) => x.className = 'tab px-4 py-2 rounded-xl bg-white border border-slate-200 font-semibold');
      b.className = 'tab px-4 py-2 rounded-xl bg-brand-500 text-white font-semibold';
      load();
    }));

    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('settingsMsg');
      const payload = {};
      // Checkboxes report true/false explicitly; other inputs send their value.
      e.target.querySelectorAll('input[name]').forEach((el) => {
        payload[el.name] = el.type === 'checkbox' ? el.checked : el.value;
      });
      try {
        await CZ.api('/api/admin/settings', { method: 'PUT', body: JSON.stringify(payload) });
        msg.className = 'mt-4 text-sm text-brand-600 font-semibold';
        msg.textContent = 'Settings saved ✓';
        msg.hidden = false;
        CZ.toast('Settings saved ✓');
      } catch (err) {
        msg.className = 'mt-4 text-sm text-red-600'; msg.textContent = err.message; msg.hidden = false;
      }
    });

    load();
  </script>
</body>
</html>
