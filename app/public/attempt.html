<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attempt Task — CashyZone</title>
  <script src="/assets/head.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="nav"></div>

  <main class="max-w-3xl mx-auto px-5 py-5">
    <a href="/tasks.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-brand-600">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      Back to tasks
    </a>

    <div id="wrap" class="mt-4">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <h1 id="title" class="text-2xl font-black">Loading…</h1>
        <span id="reward" class="text-xl font-black text-brand-600"></span>
      </div>
      <p class="text-slate-500 text-sm mt-1">Retype the text below exactly. The <b>Claim</b> button unlocks when it matches.</p>

      <!-- Source text -->
      <div class="mt-6">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Text to type</label>
        <div id="source" class="mt-2 select-none bg-white border border-slate-200 rounded-2xl p-4 leading-relaxed text-slate-700"></div>
      </div>

      <!-- Input -->
      <div class="mt-5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Your typing</label>
        <textarea id="input" rows="6" oninput="onType()" onpaste="return false" placeholder="Start typing here…"
          class="mt-2 w-full bg-white border border-slate-200 rounded-2xl p-4 leading-relaxed focus:border-brand-400 outline-none resize-y"></textarea>
        <div class="mt-3 flex items-center justify-between gap-3 flex-wrap">
          <div class="flex-1 min-w-[200px]">
            <div class="h-2 rounded-full bg-slate-200 overflow-hidden">
              <div id="bar" class="h-full bg-brand-500 transition-all" style="width:0%"></div>
            </div>
          </div>
          <span id="acc" class="text-sm font-semibold text-slate-500">0% match</span>
        </div>
      </div>

      <button id="claim" disabled onclick="claim()"
        class="mt-6 w-full bg-brand-500 text-white font-semibold py-3 rounded-xl transition disabled:opacity-40 disabled:cursor-not-allowed hover:bg-brand-600">
        Claim reward
      </button>
      <p id="msg" hidden class="mt-3 text-sm"></p>
    </div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
    if (!CZ.requireAuth()) { /* redirected */ }
    CZ.renderNav('tasks');

    const NEED = 0.97; // must match backend MIN_TYPING_ACCURACY
    const id = new URLSearchParams(location.search).get('id');
    let task = null;

    function accuracy(a, b) {
      a = (a || '').trim(); b = (b || '').trim();
      if (!a.length) return 0;
      let m = 0; const len = Math.min(a.length, b.length);
      for (let i = 0; i < len; i++) if (a[i] === b[i]) m++;
      return m / Math.max(a.length, b.length);
    }

    window.onType = function () {
      const score = accuracy(task.text, document.getElementById('input').value);
      const pct = Math.round(score * 100);
      document.getElementById('bar').style.width = pct + '%';
      document.getElementById('acc').textContent = pct + '% match';
      const ok = score >= NEED;
      document.getElementById('bar').classList.toggle('bg-brand-500', ok);
      document.getElementById('bar').classList.toggle('bg-amber-400', !ok);
      document.getElementById('claim').disabled = !ok;
    };

    window.claim = async function () {
      const btn = document.getElementById('claim');
      btn.disabled = true; btn.textContent = 'Claiming…';
      const msg = document.getElementById('msg');
      try {
        const data = await CZ.api('/api/tasks/' + id + '/claim', {
          method: 'POST',
          body: JSON.stringify({ typed: document.getElementById('input').value }),
        });
        CZ.setSession(CZ.token, { ...CZ.user, balance: data.balance });
        const pill = document.getElementById('navBalance'); if (pill) pill.textContent = CZ.money(data.balance);
        msg.className = 'mt-3 text-sm text-brand-600 font-semibold';
        msg.textContent = `🎉 Earned ${CZ.money(data.reward)}! New balance ${CZ.money(data.balance)}. Redirecting…`;
        msg.hidden = false;
        setTimeout(() => (location.href = '/tasks.html'), 1600);
      } catch (err) {
        msg.className = 'mt-3 text-sm text-red-600'; msg.textContent = err.message; msg.hidden = false;
        btn.disabled = false; btn.textContent = 'Claim reward';
      }
    };

    async function load() {
      try {
        task = await CZ.api('/api/tasks/' + id);
      } catch (err) {
        document.getElementById('wrap').innerHTML = '<p class="text-red-600 mt-6">' + err.message + '</p>';
        return;
      }

      // Must have bought the task before attempting it.
      if (task.status === 'none') {
        document.getElementById('wrap').innerHTML = `
          <div class="mt-6 bg-amber-50 border border-amber-200 text-amber-800 rounded-2xl p-6 text-center">
            <p class="font-bold text-lg">🔒 Buy this task to start</p>
            <p class="mt-2 text-sm">Buy <b>${task.title}</b> for ${CZ.money(task.price)} and earn ${CZ.money(task.reward)} (3×) on completion.</p>
            <button id="buyBtn" class="mt-4 inline-block bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition">Buy for ${CZ.money(task.price)}</button>
            <p id="buyMsg" hidden class="mt-3 text-sm"></p>
          </div>`;
        document.getElementById('buyBtn').addEventListener('click', async (ev) => {
          ev.target.disabled = true; ev.target.textContent = 'Buying…';
          try {
            await CZ.api('/api/tasks/' + id + '/buy', { method: 'POST' });
            location.reload();
          } catch (err) {
            const m = document.getElementById('buyMsg');
            m.className = 'mt-3 text-sm text-red-600'; m.textContent = err.message; m.hidden = false;
            ev.target.disabled = false; ev.target.textContent = 'Buy for ' + CZ.money(task.price);
          }
        });
        return;
      }

      document.getElementById('title').textContent = task.title;
      document.getElementById('reward').textContent = CZ.money(task.reward);
      document.getElementById('source').textContent = task.text;
      if (task.completed) {
        document.getElementById('input').disabled = true;
        const btn = document.getElementById('claim');
        btn.textContent = '✓ Already completed'; btn.disabled = true;
      }
    }
    load();
  </script>
</body>
</html>
