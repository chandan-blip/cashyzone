# CashyZone — Nginx server block for a subdomain reverse-proxying to the Node app.
#
# 1. Replace cashyzone.YOURDOMAIN.com with your real subdomain.
# 2. Put this file at /etc/nginx/sites-available/cashyzone.conf
# 3. ln -s /etc/nginx/sites-available/cashyzone.conf /etc/nginx/sites-enabled/
# 4. nginx -t && systemctl reload nginx
# 5. certbot --nginx -d cashyzone.YOURDOMAIN.com   (adds the SSL block automatically)

server {
    listen 80;
    listen [::]:80;
    server_name cashyzone.YOURDOMAIN.com;

    # Proxy everything to the Node app on 127.0.0.1:3100
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    client_max_body_size 5m;
}
